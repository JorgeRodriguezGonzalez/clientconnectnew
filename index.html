<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/images/logoCCA2.png" />
    <link rel="apple-touch-icon" href="/images/logoCCA2.png" />
    <title>Client Connect Australia | Sydney Digital Marketing Agency</title>

    <!-- Static OG/Twitter tags for scrapers that don't execute JS (WhatsApp, Facebook, LinkedIn, Twitter) -->
    <!-- react-helmet-async will override these dynamically per route in the browser -->
    <meta name="description" content="Sydney digital marketing agency helping local businesses grow with SEO, Google Ads, web design & social media. Results-driven strategies for tradies & service businesses." />
    <meta property="og:title" content="Client Connect Australia | Sydney Digital Marketing Agency" />
    <meta property="og:description" content="Sydney digital marketing agency helping local businesses grow with SEO, Google Ads, web design & social media." />
    <meta property="og:url" content="https://clientconnectaustralia.com.au" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://clientconnectaustralia.com.au/images/og-image.jpg" />
    <meta property="og:site_name" content="Client Connect Australia" />
    <meta property="og:locale" content="en_AU" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ClientConnectAU" />
    <meta name="twitter:title" content="Client Connect Australia | Sydney Digital Marketing Agency" />
    <meta name="twitter:description" content="Sydney digital marketing agency helping local businesses grow with SEO, Google Ads, web design & social media." />
    <meta name="twitter:image" content="https://clientconnectaustralia.com.au/images/og-image.jpg" />

    <link rel="preload" href="/fonts/satoshi/satoshi-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/satoshi/satoshi-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/satoshi/satoshi-700.woff2" as="font" type="font/woff2" crossorigin>
  </head>

  <body>
    <!-- Hidden forms for Netlify form detection (parsed at build time) -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <input type="url" name="url" />
      <textarea name="message"></textarea>
      <input type="hidden" name="referred_by" />
      <input type="hidden" name="utm_source" />
      <input type="hidden" name="utm_medium" />
      <input type="hidden" name="utm_campaign" />
      <input type="hidden" name="utm_term" />
      <input type="hidden" name="utm_content" />
      <input type="hidden" name="landing_page" />
      <input type="hidden" name="referrer" />
    </form>

    <form name="contact-page" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <input type="url" name="url" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="hidden" name="referred_by" />
      <input type="hidden" name="utm_source" />
      <input type="hidden" name="utm_medium" />
      <input type="hidden" name="utm_campaign" />
      <input type="hidden" name="utm_term" />
      <input type="hidden" name="utm_content" />
      <input type="hidden" name="landing_page" />
      <input type="hidden" name="referrer" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
